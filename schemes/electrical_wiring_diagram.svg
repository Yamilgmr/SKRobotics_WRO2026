<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <title>SKRobotics WRO 2026 Electrical Wiring Diagram</title>
  <desc>Arduino Mega 2560 wiring diagram for the active SKRobotics two-ultrasonic WRO Future Engineers baseline.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .card { fill: #ffffff; stroke: #263238; stroke-width: 3; rx: 18; }
      .small-card { fill: #ffffff; stroke: #263238; stroke-width: 2.5; rx: 12; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 18px Arial, sans-serif; fill: #374151; }
      .label { font: 700 21px Arial, sans-serif; fill: #111827; }
      .text { font: 16px Arial, sans-serif; fill: #1f2937; }
      .tiny { font: 14px Arial, sans-serif; fill: #374151; }
      .pin { font: 700 15px Arial, sans-serif; fill: #111827; }
      .note { font: 15px Arial, sans-serif; fill: #334155; }
      .wire-red { fill: none; stroke: #dc2626; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-black { fill: none; stroke: #111827; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-orange { fill: none; stroke: #f97316; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-blue { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-green { fill: none; stroke: #16a34a; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-purple { fill: none; stroke: #7c3aed; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-yellow { fill: none; stroke: #eab308; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-brown { fill: none; stroke: #92400e; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-gray { fill: none; stroke: #64748b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 8; }
      .bus-red { fill: #fee2e2; stroke: #dc2626; stroke-width: 3; rx: 8; }
      .bus-black { fill: #e5e7eb; stroke: #111827; stroke-width: 3; rx: 8; }
      .component-fill { fill: #eff6ff; }
      .driver-fill { fill: #fee2e2; }
      .sensor-fill { fill: #ede9fe; }
      .power-fill { fill: #ecfdf5; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text x="60" y="58" class="title">SKRobotics WRO 2026 - Current Electrical Wiring Diagram</text>
  <text x="60" y="90" class="subtitle">Active baseline: Arduino Mega 2560, L298N, MG996R servo, two HC-SR04 ultrasonic sensors, 2 x 3.7 V battery pack, breadboard, common ground.</text>

  <rect x="60" y="145" width="390" height="610" class="card component-fill"/>
  <text x="90" y="185" class="label">Arduino Mega 2560</text>
  <text x="90" y="215" class="text">Main controller</text>
  <rect x="90" y="245" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="268" class="pin">D9 Servo</text>
  <rect x="90" y="300" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="323" class="pin">D5 ENA</text>
  <rect x="90" y="345" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="368" class="pin">D6 IN1</text>
  <rect x="90" y="390" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="413" class="pin">D7 IN2</text>
  <rect x="90" y="465" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="488" class="pin">D22 TRIG F</text>
  <rect x="90" y="510" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="533" class="pin">D23 ECHO F</text>
  <rect x="90" y="570" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="593" class="pin">D24 TRIG R</text>
  <rect x="90" y="615" width="125" height="34" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="7"/>
  <text x="103" y="638" class="pin">D25 ECHO R</text>
  <rect x="90" y="685" width="125" height="34" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="7"/>
  <text x="118" y="708" class="pin">5 V</text>
  <rect x="235" y="685" width="125" height="34" fill="#e5e7eb" stroke="#111827" stroke-width="2" rx="7"/>
  <text x="270" y="708" class="pin">GND</text>

  <rect x="555" y="125" width="290" height="245" class="card power-fill"/>
  <text x="590" y="166" class="label">Breadboard</text>
  <text x="590" y="195" class="text">Logic distribution</text>
  <rect x="590" y="225" width="220" height="34" class="bus-red"/>
  <text x="655" y="248" class="pin">5 V logic rail</text>
  <rect x="590" y="285" width="220" height="34" class="bus-black"/>
  <text x="650" y="308" class="pin">Common GND rail</text>
  <text x="585" y="346" class="tiny">Sensors use 5 V and GND from here.</text>

  <rect x="1040" y="105" width="280" height="150" class="small-card sensor-fill"/>
  <text x="1070" y="145" class="label">Front HC-SR04</text>
  <text x="1070" y="175" class="text">TRIG to D22</text>
  <text x="1070" y="202" class="text">ECHO to D23</text>
  <text x="1070" y="229" class="text">VCC 5 V, GND common</text>

  <rect x="1040" y="300" width="280" height="150" class="small-card sensor-fill"/>
  <text x="1070" y="340" class="label">Right HC-SR04</text>
  <text x="1070" y="370" class="text">TRIG to D24</text>
  <text x="1070" y="397" class="text">ECHO to D25</text>
  <text x="1070" y="424" class="text">VCC 5 V, GND common</text>

  <rect x="1035" y="520" width="300" height="150" class="small-card component-fill"/>
  <text x="1065" y="560" class="label">MG996R Steering Servo</text>
  <text x="1065" y="590" class="text">Signal to D9</text>
  <text x="1065" y="617" class="text">V+ 5 V to 6 V regulated</text>
  <text x="1065" y="644" class="text">GND to common ground</text>

  <rect x="540" y="555" width="350" height="215" class="card driver-fill"/>
  <text x="575" y="596" class="label">L298N Motor Driver</text>
  <text x="575" y="626" class="text">ENA to D5 PWM</text>
  <text x="575" y="653" class="text">IN1 to D6</text>
  <text x="575" y="680" class="text">IN2 to D7</text>
  <text x="575" y="707" class="text">Motor VIN from switched 7.4 V pack</text>
  <text x="575" y="734" class="text">GND tied to common ground</text>

  <rect x="1050" y="760" width="230" height="95" class="small-card"/>
  <text x="1095" y="802" class="label">DC Motor</text>
  <text x="1085" y="831" class="text">L298N OUT1 / OUT2</text>

  <rect x="75" y="820" width="280" height="115" class="card power-fill"/>
  <text x="112" y="863" class="label">2 x 3.7 V Cells</text>
  <text x="112" y="893" class="text">7.4 V nominal battery pack</text>
  <text x="112" y="920" class="text">Check polarity before power</text>
  <rect x="410" y="840" width="160" height="75" class="small-card power-fill"/>
  <text x="448" y="884" class="label">Switch</text>
  <rect x="645" y="825" width="250" height="115" class="small-card power-fill"/>
  <text x="675" y="868" class="label">5 V to 6 V Regulator</text>
  <text x="675" y="897" class="text">Recommended for servo</text>
  <text x="675" y="923" class="text">Share ground with Mega</text>

  <path class="wire-orange" d="M215 262 C500 260 760 465 1035 570"/>
  <text x="710" y="445" class="tiny">D9 servo signal</text>
  <path class="wire-blue" d="M215 317 C380 317 430 615 540 615"/>
  <path class="wire-green" d="M215 362 C390 362 430 648 540 648"/>
  <path class="wire-purple" d="M215 407 C400 407 430 681 540 681"/>
  <text x="365" y="579" class="tiny">D5/D6/D7 motor control</text>
  <path class="wire-orange" d="M215 482 C540 465 740 165 1040 165"/>
  <path class="wire-blue" d="M215 527 C540 520 760 195 1040 195"/>
  <text x="745" y="155" class="tiny">D22 TRIG, D23 ECHO</text>
  <path class="wire-green" d="M215 587 C525 580 770 360 1040 360"/>
  <path class="wire-purple" d="M215 632 C520 632 780 395 1040 395"/>
  <text x="745" y="345" class="tiny">D24 TRIG, D25 ECHO</text>

  <path class="wire-red" d="M215 702 C330 702 430 242 590 242"/>
  <path class="wire-black" d="M360 702 C485 702 495 302 590 302"/>
  <text x="430" y="218" class="tiny">Arduino 5 V and GND to breadboard rails</text>
  <path class="wire-red" d="M810 242 C930 242 930 222 1040 222"/>
  <path class="wire-black" d="M810 302 C930 302 930 238 1040 238"/>
  <path class="wire-red" d="M810 242 C930 242 930 417 1040 417"/>
  <path class="wire-black" d="M810 302 C930 302 930 435 1040 435"/>
  <path class="wire-red" d="M810 242 C930 242 930 616 1035 616"/>
  <path class="wire-black" d="M810 302 C940 302 940 644 1035 644"/>

  <path class="wire-red" d="M355 860 L410 860"/>
  <path class="wire-red" d="M570 860 C600 860 605 707 540 707"/>
  <path class="wire-red" d="M570 860 L645 860"/>
  <path class="wire-red" d="M895 860 C955 860 965 616 1035 616"/>
  <path class="wire-black" d="M355 905 C470 905 485 734 540 734"/>
  <path class="wire-black" d="M355 905 C515 945 690 945 895 920"/>
  <path class="wire-black" d="M895 920 C955 920 975 644 1035 644"/>
  <text x="405" y="812" class="tiny">Switched battery + to L298N VIN</text>
  <text x="405" y="946" class="tiny">Battery -, L298N GND, regulator GND, servo GND, and Arduino GND must be common</text>

  <path class="wire-brown" d="M890 650 C980 650 1015 785 1050 785"/>
  <path class="wire-yellow" d="M890 690 C980 690 1015 830 1050 830"/>
  <text x="930" y="738" class="tiny">L298N OUT1 / OUT2</text>
  <path class="wire-gray" d="M570 885 C520 790 420 760 310 740"/>
  <text x="320" y="800" class="tiny">Arduino power input: USB during testing or regulated safe input after verification</text>

  <rect x="1355" y="120" width="190" height="350" class="small-card"/>
  <text x="1385" y="160" class="label">Legend</text>
  <line x1="1385" y1="195" x2="1450" y2="195" class="wire-red"/>
  <text x="1465" y="201" class="text">Power +</text>
  <line x1="1385" y1="235" x2="1450" y2="235" class="wire-black"/>
  <text x="1465" y="241" class="text">Ground</text>
  <line x1="1385" y1="275" x2="1450" y2="275" class="wire-orange"/>
  <text x="1465" y="281" class="text">Servo/trig</text>
  <line x1="1385" y1="315" x2="1450" y2="315" class="wire-blue"/>
  <text x="1465" y="321" class="text">PWM/echo</text>
  <line x1="1385" y1="355" x2="1450" y2="355" class="wire-green"/>
  <text x="1465" y="361" class="text">Digital</text>
  <line x1="1385" y1="395" x2="1450" y2="395" class="wire-purple"/>
  <text x="1465" y="401" class="text">Digital</text>
  <line x1="1385" y1="435" x2="1450" y2="435" class="wire-gray"/>
  <text x="1465" y="441" class="text">Verify</text>

  <rect x="1020" y="890" width="520" height="75" fill="#fff7ed" stroke="#f97316" stroke-width="3" rx="14"/>
  <text x="1050" y="923" class="note">Safety: keep wheels lifted during first motor tests. Do not power the DC motor from Arduino pins.</text>
  <text x="1050" y="947" class="note">If the Mega resets when steering, power the MG996R from a separate 5 V to 6 V regulator.</text>
</svg>
